services:
    database:
        image: mongo:6
        container_name: budget-tracker-database
        restart: unless-stopped
        volumes:
            - /home/chrisharrington/docker/stacks/budget-tracker/server/db:/data/db
        ports:
            - 27019:27017

    api:
        image: budget-tracker-api:latest
        container_name: budget-tracker-api
        restart: unless-stopped
        ports:
            - 9999:9999
        volumes:
            - /home/chrisharrington/docker/stacks/budget-tracker/server:/app
        depends_on:
            - database
        labels:
            - com.centurylinklabs.watchtower.enable=false

    mail:
        image: budget-tracker-mail:latest
        container_name: budget-tracker-mail
        restart: unless-stopped
        volumes:
            - /home/chrisharrington/docker/stacks/budget-tracker/server:/app
        depends_on:
            - database
        labels:
            - com.centurylinklabs.watchtower.enable=false
    
