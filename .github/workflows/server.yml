name: server

# Gate the server subproject on tests, types, lint and formatting. Path-filtered so it only runs when
# server/ changes (and so this workflow's own introduction does not self-trigger a run).
on:
    push:
        branches: [main]
        paths: ['server/**']
    pull_request:
        paths: ['server/**']

jobs:
    check:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: server
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v1

            - name: Cache bun install cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-server-${{ hashFiles('server/bun.lock') }}
                  restore-keys: bun-${{ runner.os }}-server-

            - run: bun install --frozen-lockfile

            - run: bun test

            - run: bunx tsc --noEmit

            - run: bun run lint

            - run: bun run format:check
